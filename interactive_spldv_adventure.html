        // --- 1. WEB AUDIO API SYNTHESIZER ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); // E5
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); // G5
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.24); // C6
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'incorrect') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(350, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(250, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch (e) {
                console.log("Audio contexts require user interaction first.");
            }
        }

                `
            },
            // Slide 27: Soal Cerita 3 & 4
            {
                section: "Soal Cerita",
                title: "Dunia Usaha & Lahan Parkir",
                subtitle: "Complex modeling scenarios",
                icon: "🅿️",
                render: () => `
                    <div class="space-y-4">
                        <div class="bg-purple-50 border border-purple-200 p-3 rounded-xl">
                            <p class="text-xs font-bold text-purple-950">Soal Cerita 3: Penghitungan Roda di Lahan Parkir</p>
                            <p class="text-[11px] text-gray-600">Ada 40 kendaraan terdiri atas mobil (roda 4) dan sepeda motor (roda 2) di lahan parkir. Jika jumlah roda seluruhnya ada 110 buah, berapa banyak mobil yang parkir?</p>
                            <div class="flex gap-2 mt-2">
                                <button onclick="checkSlideAnswer(this, true, 'Luar Biasa Cerdas! Model: x+y = 40 dan 4x+2y = 110. Selesaikan untuk memperoleh jumlah mobil (x) = 15 buah.', 15)" class="bg-white px-3 py-1.5 rounded-lg border text-[10px] font-bold">15 Mobil</button>
                                <button onclick="checkSlideAnswer(this, false, 'Kurang tepat.', 15)" class="bg-white px-3 py-1.5 rounded-lg border text-[10px] font-bold">20 Mobil</button>

                        <div class="bg-amber-50 border border-amber-200 p-3 rounded-xl">
                            <p class="text-xs font-bold text-amber-950">Soal Cerita 4: Meracik Kopi Spesial Cafe</p>
                            <p class="text-[11px] text-gray-600">Seorang barista ingin meracik kopi campuran sebanyak 10 kg seharga Rp92.000/kg dari biji kopi arabika (Rp100.000/kg) dan biji kopi robusta (Rp80.000/kg). Berapa kg kopi robusta yang digunakan?</p>
                            <div class="flex gap-2 mt-2">
                                <button onclick="checkSlideAnswer(this, false, 'Hitung kembali perbandingan harganya.', 15)" class="bg-white px-3 py-1.5 rounded-lg border text-[10px] font-bold">2 kg</button>
                                <button onclick="checkSlideAnswer(this, true, 'Sempurna! Model: x+y = 10 dan 100.000x + 80.000y = 920.000. Diperoleh kopi robusta (y) = 4 kg.', 15)" class="bg-white px-3 py-1.5 rounded-lg border text-[10px] font-bold">4 kg</button>

                `
            },
            // Slide 28: Soal Cerita 5 (HOTS)
            {
                section: "Soal Cerita",
                title: "Misi 10: Arus Sungai Kalimantan",
                subtitle: "Advanced relative speed system (HOTS)",
                icon: "🚣",
                render: () => `
                    <div class="grid md:grid-cols-2 gap-4 items-center">

            },
            // Slide 29: Refleksi
            {
                section: "Refleksi",
                title: "Bagaimana Perasaan Belajarmu?",
                subtitle: "Kurikulum Merdeka Self-Evaluation",
                icon: "🌿",
                render: () => `
                    <div class="text-center max-w-xl mx-auto">
                        <p class="text-sm font-bold text-gray-600 mb-6">Pilih emotikon yang mewakili tingkat pemahamanmu hari ini:</p>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="handleEmotionSelect(this, 'sangat-paham')" class="bg-white hover:bg-emerald-50 border-2 border-emerald-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">😎</span>
                                <span class="text-xs font-bold text-gray-600">Sangat Paham</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'butuh-latihan')" class="bg-white hover:bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🤔</span>
                                <span class="text-xs font-bold text-gray-600">Butuh Latihan</span>
                            </button>
                            <button onclick="handleEmotionSelect(this, 'siap-tantangan')" class="bg-white hover:bg-indigo-50 border-2 border-indigo-200 p-4 rounded-2xl flex flex-col items-center transition active:scale-95">
                                <span class="text-4xl mb-2">🚀</span>
                                <span class="text-xs font-bold text-gray-600">Siap Naik Level</span>
                            </button>
                        </div>
                        <p id="emotion-feedback" class="text-xs font-bold text-[#059669] mt-6 min-h-[16px]"></p>
                    </div>
                `
            },
            // Slide 30: Kesimpulan
            {
                section: "Kesimpulan",
                title: "Misi SPLDV Selesai!",
                subtitle: "You are officially an Algebra Master!",
                icon: "🏆",
                render: () => `
                    <div class="text-center">
                        <span class="text-7xl block mb-3 animate-bounce">👑🏆</span>
                        <h2 class="heading-font text-3xl font-extrabold text-[#065F46] mb-1">Misi Selesai dengan Gemilang!</h2>
                        <p class="text-xs md:text-sm text-gray-600 max-w-md mx-auto mb-6">Luar biasa! Kamu telah melintasi dan menuntaskan 30 slide tantangan interaktif SPLDV Kurikulum Merdeka. Pertahankan terus ketajaman analisismu!</p>
                        <div onclick="resetAdventure()" class="inline-block bg-gradient-to-r from-[#10B981] to-emerald-600 text-white font-black px-8 py-3 rounded-2xl shadow-lg hover:scale-105 transition duration-300 cursor-pointer text-xs md:text-sm">
                            🔄 ULANGI PETUALANGAN
                        </div>
                    </div>
                `
            }
        ];

        // --- STREAMING_CHUNK:Initializing state variables... ---
        // --- 3. STATE ENGINE ---
        let currentSlide = 0;
        let score = 0;

        // Canvas Drawing Setup
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Confetti Canvas Setup
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        // --- 4. ENGINE INITIALIZATION ---
        window.onload = function() {
            loadSlide(0);
            initCanvas();
            setupTouchGestures();
        };

        // --- STREAMING_CHUNK:Constructing slide transition system... ---
        // --- 5. SLIDE RENDERING CONTROLLER ---
        function loadSlide(index) {
            if (index < 0 || index >= slides.length) return;
            currentSlide = index;

            const slide = slides[currentSlide];
            
            const headerHtml = `
                <div class="mb-5 border-b-2 border-gray-100 pb-3">
                    <span class="text-xs font-black text-[#10B981] uppercase tracking-widest">${slide.section}</span>
                    <h1 class="heading-font text-2xl md:text-3xl font-extrabold text-slate-800 flex items-center gap-2 mt-1">
                        <span>${slide.icon}</span> ${slide.title}
                    </h1>
                    <p class="text-xs text-gray-400 font-semibold italic">${slide.subtitle}</p>
                </div>
            `;
            
            document.getElementById('slide-content').innerHTML = headerHtml + slide.render();

            // Progress bar
            const percent = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            // Footer metadata
            document.getElementById('slide-index').innerText = `Slide ${currentSlide + 1} / ${slides.length}`;
            document.getElementById('section-name').innerText = `Misi: ${slide.section}`;

            // Button opacity states
            document.getElementById('prev-btn').style.opacity = currentSlide === 0 ? "0.3" : "1";
            document.getElementById('next-btn').style.opacity = currentSlide === slides.length - 1 ? "0.3" : "1";

            // Special interactive slide trigger
            if (currentSlide === 12) { 
                setTimeout(drawSPLDV, 100);
            }

            // Force MathJax to scan and render formulas in the newly injected slide
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function changeSlide(direction) {
            const nextIdx = currentSlide + direction;
            if (nextIdx >= 0 && nextIdx < slides.length) {
                playSound('click');
                loadSlide(nextIdx);
            }
        }

        // --- STREAMING_CHUNK:Configuring answer evaluation... ---
        // --- 6. INTERACTIVE SLIDE FEEDBACKS ---
        function checkSlideAnswer(element, isCorrect, feedback, points = 10) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'border-red-400', 'bg-red-50');
            });

            if (isCorrect) {
                element.classList.add('border-emerald-500', 'bg-emerald-50');
                playSound('correct');
                showToast("✨ " + feedback, "bg-[#10B981]");
                score += points;
                document.getElementById('score-display').innerText = `${score} XP`;
                triggerConfetti();
            } else {
                element.classList.add('border-red-400', 'bg-red-50');
                playSound('incorrect');
                showToast("❌ " + feedback, "bg-red-500");
            }
        }

        function handleEmotionSelect(element, emotion) {
            const parent = element.parentNode;
            Array.from(parent.children).forEach(btn => {
                btn.classList.remove('ring-4', 'ring-[#10B981]', 'scale-105');
            });
            element.classList.add('ring-4', 'ring-[#10B981]', 'scale-105');
            
            const feedbackText = document.getElementById('emotion-feedback');
            if (emotion === 'sangat-paham') {
                feedbackText.innerText = "Luar biasa! Konsep dasar hingga tingkat tinggi sudah kamu kuasai dengan sangat baik! 😎";
                playSound('correct');
                triggerConfetti();
            } else if (emotion === 'butuh-latihan') {
                feedbackText.innerText = "Santai saja, kerjakan ulang soal perhitungan di atas dengan memanfaatkan papan cakar! 🧠";
                playSound('click');
            } else {
                feedbackText.innerText = "Dahsyat! Jiwa petualangmu siap menghadapi soal-soal olimpiade berikutnya! 🚀";
                playSound('correct');
                triggerConfetti();
            }
        }

        function showToast(text, bgClass) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toast.className = `fixed bottom-12 left-1/2 transform -translate-x-1/2 z-50 text-white font-black px-6 py-3 rounded-2xl shadow-xl flex items-center gap-2 animate-bounce ${bgClass}`;
            toastText.innerText = text;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function resetAdventure() {
            score = 0;
            document.getElementById('score-display').innerText = `0 XP`;
            loadSlide(0);
        }

        // --- STREAMING_CHUNK:Plotting interactive graph... ---
        // --- 7. DYNAMIC SPLDV GRAPH PLOTTER ---
        function drawSPLDV() {
            const c1 = parseFloat(document.getElementById('range-c1').value);
            const c2 = parseFloat(document.getElementById('range-c2').value);

            // Update Label texts
            document.getElementById('val-c1').innerText = c1;
            document.getElementById('val-c2').innerText = c2;

            // Solve system: x + y = c1 AND x - y = c2
            const x = (c1 + c2) / 2;
            const y = (c1 - c2) / 2;

            document.getElementById('solution-display').innerText = `x = ${x.toFixed(1)}, y = ${y.toFixed(1)}`;

            // Grid mapping function (domain [-5, 5] mapped to viewport [10, 90])
            const mapX = (val) => 50 + val * 8;
            const mapY = (val) => 50 - val * 8; // Invert Y coordinate for SVG space

            // Update line coordinates
            // Line 1: y = -x + c1 (For x=-5, y=5+c1 | For x=5, y=-5+c1)
            document.getElementById('svg-line1').setAttribute('x1', mapX(-5));
            document.getElementById('svg-line1').setAttribute('y1', mapY(5 + c1));
            document.getElementById('svg-line1').setAttribute('x2', mapX(5));
            document.getElementById('svg-line1').setAttribute('y2', mapY(-5 + c1));

            // Line 2: y = x - c2 (For x=-5, y=-5-c2 | For x=5, y=5-c2)
            document.getElementById('svg-line2').setAttribute('x1', mapX(-5));
            document.getElementById('svg-line2').setAttribute('y1', mapY(-5 - c2));
            document.getElementById('svg-line2').setAttribute('x2', mapX(5));
            document.getElementById('svg-line2').setAttribute('y2', mapY(5 - c2));

            // Place intersection dot
            const cx = mapX(x);
            const cy = mapY(y);
            const dot = document.getElementById('svg-intersection');
            
            // Boundary safety guard
            if (cx >= 5 && cx <= 95 && cy >= 5 && cy <= 95) {
                dot.setAttribute('cx', cx);
                dot.setAttribute('cy', cy);
                dot.style.display = 'block';
            } else {
                dot.style.display = 'none';
            }
        }

        // --- STREAMING_CHUNK:Activating drawing canvas... ---
        // --- 8. DOODLE CANVAS SYSTEM ---
        function toggleScratchpad() {
            const pad = document.getElementById('scratchpad');
            pad.classList.toggle('hidden');
            if (!pad.classList.contains('hidden')) {
                resizeCanvas();
            }
        }

        function initCanvas() {
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                ctx.beginPath();
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);

            // Responsive Touch Screen controls
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                ctx.beginPath();
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isDrawing) return;
                const t = e.touches[0];
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
                ctx.stroke();
            });
            canvas.addEventListener('touchend', () => isDrawing = false);
        }

        function resizeCanvas() {
            const parent = canvas.parentNode;
            canvas.width = parent.clientWidth;
            canvas.height = parent.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#4F46E5'; 
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- 9. SWIPE GESTURES ---
        let startX = 0;
        function setupTouchGestures() {
            const wrapper = document.getElementById('slide-wrapper');
            wrapper.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, false);

            wrapper.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].screenX;
                const threshold = 65;
                if (startX - endX > threshold) {
                    changeSlide(1); // Next slide
                } else if (endX - startX > threshold) {
                    changeSlide(-1); // Prev slide
                }
            }, false);
        }

        // --- STREAMING_CHUNK:Configuring confetti celebratory effects... ---
        // --- 10. CONFETTI CELEBRATION SYSTEM ---
        function triggerConfetti() {
            confettiActive = true;
            confettiCanvas.classList.remove('hidden');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            
            particles = [];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    r: Math.random() * 5 + 4,
                    d: Math.random() * confettiCanvas.height,
                    color: `hsl(${Math.random() * 360}, 100%, 70%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            animateConfetti();
            setTimeout(() => {
                confettiActive = false;
                confettiCanvas.classList.add('hidden');
            }, 2500);
        }

        function animateConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            
            particles.forEach((p, idx) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - idx / 3) * 15;

                confettiCtx.beginPath();
                confettiCtx.lineWidth = p.r;
                confettiCtx.strokeStyle = p.color;
                confettiCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                confettiCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                confettiCtx.stroke();
            });

            requestAnimationFrame(animateConfetti);
        }
    </script>
